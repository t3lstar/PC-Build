<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Build sequence</title>
  <desc id="desc">Build sequence from component confirmation through preparation, assembly, first boot, Windows, drivers, EXPO and benchmark baseline.</desc>
  <style>
    .box{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.check{fill:#dcfce7;stroke:#15803d;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}
    .line{stroke:#334155;stroke-width:3;marker-end:url(#arrow)}text{font-family:Arial,sans-serif;fill:#0f172a;font-size:15px}.title{font-size:22px;font-weight:bold}
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <text class="title" x="30" y="35">Build Sequence</text>
  <rect class="check" x="35" y="70" width="180" height="48" rx="6"/><text x="55" y="100">Confirm parts and tools</text>
  <line class="line" x1="215" y1="94" x2="250" y2="94"/>
  <rect class="box" x="250" y="70" width="180" height="48" rx="6"/><text x="282" y="100">Prepare workspace</text>
  <line class="line" x1="430" y1="94" x2="465" y2="94"/>
  <rect class="box" x="465" y="70" width="180" height="48" rx="6"/><text x="500" y="100">Install CPU</text>
  <line class="line" x1="645" y1="94" x2="680" y2="94"/>
  <rect class="box" x="680" y="70" width="180" height="48" rx="6"/><text x="715" y="100">Install DDR5</text>
  <line class="line" x1="860" y1="94" x2="895" y2="94"/>
  <rect class="box" x="895" y="70" width="170" height="48" rx="6"/><text x="925" y="100">Install SSD</text>
  <line class="line" x1="980" y1="118" x2="980" y2="160"/>
  <rect class="warn" x="895" y="160" width="170" height="48" rx="6"/><text x="916" y="190">Prepare PSU cables</text>
  <line class="line" x1="895" y1="184" x2="860" y2="184"/>
  <rect class="box" x="680" y="160" width="180" height="48" rx="6"/><text x="704" y="190">Install motherboard</text>
  <line class="line" x1="680" y1="184" x2="645" y2="184"/>
  <rect class="warn" x="465" y="160" width="180" height="48" rx="6"/><text x="495" y="190">Install top AIO</text>
  <line class="line" x1="465" y1="184" x2="430" y2="184"/>
  <rect class="box" x="250" y="160" width="180" height="48" rx="6"/><text x="288" y="190">Install GPU</text>
  <line class="line" x1="250" y1="184" x2="215" y2="184"/>
  <rect class="box" x="35" y="160" width="180" height="48" rx="6"/><text x="62" y="190">Connect cables</text>
  <line class="line" x1="125" y1="208" x2="125" y2="250"/>
  <rect class="check" x="35" y="250" width="180" height="48" rx="6"/><text x="63" y="280">First boot</text>
  <line class="line" x1="215" y1="274" x2="250" y2="274"/>
  <rect class="check" x="250" y="250" width="180" height="48" rx="6"/><text x="282" y="280">BIOS checks</text>
  <line class="line" x1="430" y1="274" x2="465" y2="274"/>
  <rect class="box" x="465" y="250" width="180" height="48" rx="6"/><text x="493" y="280">Install Windows</text>
  <line class="line" x1="645" y1="274" x2="680" y2="274"/>
  <rect class="box" x="680" y="250" width="180" height="48" rx="6"/><text x="720" y="280">Install drivers</text>
  <line class="line" x1="860" y1="274" x2="895" y2="274"/>
  <rect class="warn" x="895" y="250" width="170" height="48" rx="6"/><text x="932" y="280">Enable EXPO</text>
  <line class="line" x1="980" y1="298" x2="980" y2="340"/>
  <rect class="check" x="895" y="340" width="170" height="48" rx="6"/><text x="920" y="370">Benchmark baseline</text>
</svg>
