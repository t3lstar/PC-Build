<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Build sequence</title>
  <desc id="desc">Detailed build sequence preserving the Mermaid source steps from component confirmation through benchmark baseline.</desc>
  <style>
    .bg{fill:#f8fafc}.box{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.check{fill:#dcfce7;stroke:#15803d;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}
    .line{stroke:#334155;stroke-width:3;marker-end:url(#arrow)}text{font-family:Arial,sans-serif;fill:#0f172a;font-size:18px}.title{font-size:28px;font-weight:bold}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0,0 L0,8 L11,4 z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="44" y="50">Build Sequence</text>
  <rect class="check" x="70" y="90" width="240" height="70" rx="8"/><text x="100" y="120">Confirm components</text><text x="138" y="145">and tools</text>
  <line class="line" x1="310" y1="125" x2="365" y2="125"/>
  <rect class="box" x="365" y="90" width="240" height="70" rx="8"/><text x="412" y="120">Prepare workspace</text><text x="455" y="145">and case</text>
  <line class="line" x1="605" y1="125" x2="660" y2="125"/>
  <rect class="box" x="660" y="90" width="240" height="70" rx="8"/><text x="695" y="132">Install CPU in AM5 socket</text>
  <line class="line" x1="900" y1="125" x2="955" y2="125"/>
  <rect class="box" x="955" y="90" width="240" height="70" rx="8"/><text x="990" y="120">Install DDR5 in</text><text x="1025" y="145">A2 and B2</text>
  <line class="line" x1="1075" y1="160" x2="1075" y2="215"/>
  <rect class="box" x="955" y="215" width="240" height="70" rx="8"/><text x="995" y="245">Install Samsung</text><text x="1018" y="270">NVMe SSD</text>
  <line class="line" x1="955" y1="250" x2="900" y2="250"/>
  <rect class="warn" x="660" y="215" width="240" height="70" rx="8"/><text x="702" y="245">Prepare PSU</text><text x="730" y="270">cables</text>
  <line class="line" x1="660" y1="250" x2="605" y2="250"/>
  <rect class="box" x="365" y="215" width="240" height="70" rx="8"/><text x="395" y="245">Install motherboard</text><text x="450" y="270">in case</text>
  <line class="line" x1="365" y1="250" x2="310" y2="250"/>
  <rect class="warn" x="70" y="215" width="240" height="70" rx="8"/><text x="106" y="245">Install top 360mm</text><text x="155" y="270">AIO</text>
  <line class="line" x1="190" y1="285" x2="190" y2="340"/>
  <rect class="box" x="70" y="340" width="240" height="70" rx="8"/><text x="117" y="370">Install Radeon</text><text x="160" y="395">GPU</text>
  <line class="line" x1="310" y1="375" x2="365" y2="375"/>
  <rect class="box" x="365" y="340" width="240" height="70" rx="8"/><text x="413" y="370">Connect front</text><text x="394" y="395">panel and cables</text>
  <line class="line" x1="605" y1="375" x2="660" y2="375"/>
  <rect class="check" x="660" y="340" width="240" height="70" rx="8"/><text x="705" y="370">First boot at</text><text x="700" y="395">default settings</text>
  <line class="line" x1="900" y1="375" x2="955" y2="375"/>
  <rect class="check" x="955" y="340" width="240" height="70" rx="8"/><text x="1005" y="370">BIOS baseline</text><text x="1030" y="395">checks</text>
  <line class="line" x1="1075" y1="410" x2="1075" y2="465"/>
  <rect class="box" x="955" y="465" width="240" height="70" rx="8"/><text x="1004" y="495">Install Windows</text><text x="1035" y="520">11 Pro</text>
  <line class="line" x1="955" y1="500" x2="900" y2="500"/>
  <rect class="box" x="660" y="465" width="240" height="70" rx="8"/><text x="724" y="508">Install drivers</text>
  <line class="line" x1="660" y1="500" x2="605" y2="500"/>
  <rect class="warn" x="365" y="465" width="240" height="70" rx="8"/><text x="427" y="508">Enable EXPO</text>
  <line class="line" x1="365" y1="500" x2="310" y2="500"/>
  <rect class="check" x="70" y="465" width="240" height="70" rx="8"/><text x="115" y="495">Benchmark and</text><text x="112" y="520">record baseline</text>
</svg>
