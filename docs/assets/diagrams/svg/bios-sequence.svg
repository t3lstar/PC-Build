<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">BIOS sequence</title>
  <desc id="desc">BIOS setup sequence from first default boot through hardware confirmation, Windows setup, drivers, EXPO and verification.</desc>
  <style>
    .box{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.line{stroke:#334155;stroke-width:3;marker-end:url(#arrow)}text{font-family:Arial,sans-serif;fill:#0f172a;font-size:15px}.title{font-size:22px;font-weight:bold}
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <text class="title" x="30" y="35">BIOS Setup Sequence</text>
  <rect class="box" x="70" y="80" width="210" height="52" rx="6"/><text x="112" y="112">Enter BIOS</text>
  <line class="line" x1="280" y1="106" x2="330" y2="106"/><rect class="box" x="330" y="80" width="230" height="52" rx="6"/><text x="355" y="103">Confirm CPU, RAM, SSD,</text><text x="390" y="121">pump and fans</text>
  <line class="line" x1="560" y1="106" x2="610" y2="106"/><rect class="box" x="610" y="80" width="250" height="52" rx="6"/><text x="645" y="112">Load optimized defaults</text>
  <line class="line" x1="735" y1="132" x2="735" y2="175"/><rect class="box" x="610" y="175" width="250" height="52" rx="6"/><text x="650" y="198">Confirm UEFI, TPM,</text><text x="672" y="216">Secure Boot</text>
  <line class="line" x1="610" y1="201" x2="560" y2="201"/><rect class="box" x="330" y="175" width="230" height="52" rx="6"/><text x="360" y="207">Set USB boot device</text>
  <line class="line" x1="330" y1="201" x2="280" y2="201"/><rect class="box" x="70" y="175" width="210" height="52" rx="6"/><text x="105" y="207">Install Windows</text>
  <line class="line" x1="175" y1="227" x2="175" y2="270"/><rect class="box" x="70" y="270" width="210" height="52" rx="6"/><text x="115" y="302">Install drivers</text>
  <line class="line" x1="280" y1="296" x2="330" y2="296"/><rect class="warn" x="330" y="270" width="230" height="52" rx="6"/><text x="382" y="302">Enable EXPO</text>
  <line class="line" x1="560" y1="296" x2="610" y2="296"/><rect class="warn" x="610" y="270" width="250" height="52" rx="6"/><text x="650" y="302">DDR5 memory training</text>
  <line class="line" x1="735" y1="322" x2="735" y2="365"/><rect class="ok" x="610" y="365" width="250" height="52" rx="6"/><text x="650" y="397">Verify DDR5-6000</text>
  <line class="line" x1="610" y1="391" x2="560" y2="391"/><rect class="ok" x="330" y="365" width="230" height="52" rx="6"/><text x="370" y="397">Benchmark baseline</text>
</svg>
