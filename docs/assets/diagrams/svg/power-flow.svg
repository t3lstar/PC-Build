<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">Power flow</title>
  <desc id="desc">Power flow from wall outlet to PSU, then to motherboard, CPU, GPU and optional accessories.</desc>
  <style>
    .box{fill:#fef3c7;stroke:#b45309;stroke-width:2}.load{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.line{stroke:#334155;stroke-width:4;marker-end:url(#arrow)}text{font-family:Arial,sans-serif;fill:#0f172a;font-size:16px}.title{font-size:22px;font-weight:bold}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <text class="title" x="30" y="35">Power Flow</text>
  <rect class="box" x="40" y="210" width="130" height="60" rx="6"/><text x="70" y="246">Wall outlet</text>
  <line class="line" x1="170" y1="240" x2="240" y2="240"/>
  <rect class="box" x="240" y="185" width="170" height="110" rx="8"/><text x="268" y="235">ASUS TUF</text><text x="278" y="260">1000W PSU</text>
  <line class="line" x1="410" y1="215" x2="545" y2="105"/><rect class="load" x="545" y="75" width="180" height="60" rx="6"/><text x="583" y="112">24-pin ATX</text>
  <line class="line" x1="410" y1="240" x2="545" y2="240"/><rect class="load" x="545" y="210" width="180" height="60" rx="6"/><text x="575" y="247">CPU EPS</text>
  <line class="line" x1="410" y1="265" x2="545" y2="375"/><rect class="load" x="545" y="345" width="180" height="60" rx="6"/><text x="582" y="382">PCIe 8-pin</text>
  <line class="line" x1="725" y1="105" x2="820" y2="105"/><rect class="load" x="820" y="75" width="140" height="60" rx="6"/><text x="843" y="112">Motherboard</text>
  <line class="line" x1="725" y1="240" x2="820" y2="240"/><rect class="load" x="820" y="210" width="140" height="60" rx="6"/><text x="850" y="247">CPU</text>
  <line class="line" x1="725" y1="375" x2="820" y2="375"/><rect class="load" x="820" y="345" width="140" height="60" rx="6"/><text x="850" y="382">GPU</text>
</svg>
