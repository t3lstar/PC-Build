<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Boot process</title>
  <desc id="desc">Boot process from power button through POST, BIOS, Windows USB installer, NVMe boot and driver validation.</desc>
  <style>
    .box{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.decision{fill:#fef3c7;stroke:#b45309;stroke-width:2}.fix{fill:#fee2e2;stroke:#dc2626;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.line{stroke:#334155;stroke-width:3;marker-end:url(#arrow)}text{font-family:Arial,sans-serif;fill:#0f172a;font-size:15px}.title{font-size:22px;font-weight:bold}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <text class="title" x="30" y="35">Boot Process</text>
  <rect class="box" x="70" y="80" width="180" height="50" rx="6"/><text x="102" y="110">Power button</text>
  <line class="line" x1="250" y1="105" x2="310" y2="105"/>
  <rect class="box" x="310" y="80" width="180" height="50" rx="6"/><text x="343" y="110">PSU starts</text>
  <line class="line" x1="490" y1="105" x2="550" y2="105"/>
  <rect class="box" x="550" y="80" width="180" height="50" rx="6"/><text x="575" y="110">Motherboard POST</text>
  <line class="line" x1="640" y1="130" x2="640" y2="185"/>
  <polygon class="decision" points="640,185 760,250 640,315 520,250"/><text x="575" y="245">Hardware</text><text x="586" y="265">detected?</text>
  <line class="line" x1="520" y1="250" x2="340" y2="250"/><text x="410" y="235">No</text>
  <rect class="fix" x="130" y="220" width="210" height="60" rx="6"/><text x="152" y="245">Check debug LEDs,</text><text x="160" y="265">seating and cables</text>
  <line class="line" x1="235" y1="220" x2="560" y2="130"/>
  <line class="line" x1="640" y1="315" x2="640" y2="370"/><text x="655" y="350">Yes</text>
  <polygon class="decision" points="640,370 760,435 640,500 520,435"/><text x="582" y="432">Windows</text><text x="590" y="452">installed?</text>
  <line class="line" x1="520" y1="435" x2="340" y2="435"/><text x="420" y="420">No</text>
  <rect class="box" x="130" y="405" width="210" height="60" rx="6"/><text x="160" y="430">Boot Windows USB</text><text x="160" y="450">and install to SSD</text>
  <line class="line" x1="340" y1="435" x2="520" y2="435"/>
  <line class="line" x1="760" y1="435" x2="820" y2="435"/><text x="775" y="420">Yes</text>
  <rect class="ok" x="820" y="405" width="140" height="60" rx="6"/><text x="842" y="430">Boot NVMe</text><text x="833" y="450">and validate</text>
</svg>
