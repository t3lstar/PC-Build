<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Boot process</title>
  <desc id="desc">Detailed boot process preserving the Mermaid source decisions and troubleshooting loop.</desc>
  <style>
    .bg{fill:#f8fafc}.box{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.fix{fill:#fee2e2;stroke:#dc2626;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.decision{fill:#fef3c7;stroke:#b45309;stroke-width:2}.line{stroke:#334155;stroke-width:3;marker-end:url(#arrow)}
    text{font-family:Arial,sans-serif;fill:#0f172a;font-size:18px}.title{font-size:28px;font-weight:bold}.small{font-size:16px}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0,0 L0,8 L11,4 z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1280" height="900"/>
  <text class="title" x="42" y="50">Boot Process</text>
  <rect class="box" x="70" y="95" width="230" height="70" rx="8"/><text x="105" y="137">Power button pressed</text>
  <line class="line" x1="300" y1="130" x2="365" y2="130"/>
  <rect class="box" x="365" y="95" width="270" height="70" rx="8"/><text x="390" y="125">PSU supplies standby</text><text x="405" y="150">and system power</text>
  <line class="line" x1="635" y1="130" x2="700" y2="130"/>
  <rect class="box" x="700" y="95" width="300" height="70" rx="8"/><text x="728" y="125">Motherboard firmware</text><text x="765" y="150">starts POST</text>
  <line class="line" x1="850" y1="165" x2="850" y2="230"/>
  <polygon class="decision" points="850,230 1030,325 850,420 670,325"/><text x="750" y="315">CPU, RAM, GPU,</text><text x="785" y="340">SSD detected?</text>
  <line class="line" x1="670" y1="325" x2="475" y2="325"/><text class="small" x="560" y="305">No</text>
  <rect class="fix" x="180" y="285" width="295" height="80" rx="8"/><text x="220" y="315">Check debug LEDs and</text><text x="225" y="340">reseat relevant component</text>
  <line class="line" x1="327" y1="285" x2="730" y2="160"/>
  <line class="line" x1="850" y1="420" x2="850" y2="485"/><text class="small" x="870" y="455">Yes</text>
  <rect class="box" x="700" y="485" width="300" height="70" rx="8"/><text x="735" y="515">Enter BIOS or continue</text><text x="825" y="540">boot</text>
  <line class="line" x1="850" y1="555" x2="850" y2="605"/>
  <polygon class="decision" points="850,605 1015,690 850,775 685,690"/><text x="780" y="685">Windows installed?</text>
  <line class="line" x1="685" y1="690" x2="475" y2="690"/><text class="small" x="570" y="670">No</text>
  <rect class="box" x="170" y="650" width="305" height="70" rx="8"/><text x="215" y="680">Boot Windows 11 USB</text><text x="255" y="705">installer</text>
  <line class="line" x1="322" y1="720" x2="322" y2="770"/>
  <rect class="box" x="170" y="770" width="305" height="70" rx="8"/><text x="222" y="800">Install Windows 11</text><text x="282" y="825">Pro</text>
  <line class="line" x1="475" y1="805" x2="610" y2="805"/>
  <line class="line" x1="1015" y1="690" x2="1110" y2="690"/><text class="small" x="1048" y="670">Yes</text>
  <rect class="ok" x="1110" y="650" width="145" height="70" rx="8"/><text x="1126" y="680">Boot Windows</text><text x="1126" y="705">from NVMe</text>
  <line class="line" x1="1110" y1="705" x2="1010" y2="805"/>
  <rect class="ok" x="610" y="770" width="320" height="70" rx="8"/><text x="660" y="800">Install drivers and</text><text x="674" y="825">validate baseline</text>
</svg>
