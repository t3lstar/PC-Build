<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" role="img" aria-labelledby="title desc">
  <title id="title">Driver installation order</title>
  <desc id="desc">Detailed driver order preserving the Mermaid source labels.</desc>
  <style>
    .bg{fill:#f8fafc}.box{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.line{stroke:#334155;stroke-width:3;marker-end:url(#arrow)}
    text{font-family:Arial,sans-serif;fill:#0f172a;font-size:17px}.title{font-size:28px;font-weight:bold}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0,0 L0,8 L11,4 z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1280" height="300"/>
  <text class="title" x="40" y="48">Driver Installation Order</text>
  <rect class="box" x="35" y="105" width="145" height="70" rx="8"/><text x="70" y="133">Windows</text><text x="77" y="158">Update</text>
  <line class="line" x1="180" y1="140" x2="215" y2="140"/>
  <rect class="box" x="215" y="105" width="150" height="70" rx="8"/><text x="250" y="133">AMD chipset</text><text x="268" y="158">driver</text>
  <line class="line" x1="365" y1="140" x2="400" y2="140"/>
  <rect class="box" x="400" y="105" width="150" height="70" rx="8"/><text x="432" y="133">LAN or Wi-Fi</text><text x="455" y="158">driver</text>
  <line class="line" x1="550" y1="140" x2="585" y2="140"/>
  <rect class="box" x="585" y="105" width="160" height="70" rx="8"/><text x="615" y="133">Bluetooth driver</text><text x="640" y="158">if required</text>
  <line class="line" x1="745" y1="140" x2="780" y2="140"/>
  <rect class="box" x="780" y="105" width="150" height="70" rx="8"/><text x="812" y="133">Audio driver</text><text x="830" y="158">if required</text>
  <line class="line" x1="930" y1="140" x2="965" y2="140"/>
  <rect class="box" x="965" y="105" width="145" height="70" rx="8"/><text x="995" y="133">AMD Radeon</text><text x="998" y="158">GPU driver</text>
  <line class="line" x1="1110" y1="140" x2="1145" y2="140"/>
  <rect class="ok" x="1145" y="105" width="110" height="70" rx="8"/><text x="1166" y="133">Device</text><text x="1158" y="158">Manager</text>
</svg>
