<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="220" viewBox="0 0 1050 220" role="img" aria-labelledby="title desc">
  <title id="title">Driver installation order</title>
  <desc id="desc">Recommended driver installation order from Windows Update through chipset, network, Bluetooth, audio, Radeon GPU driver and Device Manager verification.</desc>
  <style>
    .box{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.line{stroke:#334155;stroke-width:3;marker-end:url(#arrow)}text{font-family:Arial,sans-serif;fill:#0f172a;font-size:14px}.title{font-size:22px;font-weight:bold}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <text class="title" x="30" y="35">Driver Installation Order</text>
  <rect class="box" x="30" y="85" width="120" height="52" rx="6"/><text x="48" y="116">Windows Update</text>
  <line class="line" x1="150" y1="111" x2="180" y2="111"/><rect class="box" x="180" y="85" width="120" height="52" rx="6"/><text x="205" y="116">Chipset</text>
  <line class="line" x1="300" y1="111" x2="330" y2="111"/><rect class="box" x="330" y="85" width="120" height="52" rx="6"/><text x="363" y="108">LAN or</text><text x="366" y="126">Wi-Fi</text>
  <line class="line" x1="450" y1="111" x2="480" y2="111"/><rect class="box" x="480" y="85" width="120" height="52" rx="6"/><text x="505" y="116">Bluetooth</text>
  <line class="line" x1="600" y1="111" x2="630" y2="111"/><rect class="box" x="630" y="85" width="120" height="52" rx="6"/><text x="675" y="116">Audio</text>
  <line class="line" x1="750" y1="111" x2="780" y2="111"/><rect class="box" x="780" y="85" width="120" height="52" rx="6"/><text x="812" y="108">Radeon</text><text x="815" y="126">driver</text>
  <line class="line" x1="900" y1="111" x2="930" y2="111"/><rect class="ok" x="930" y="85" width="100" height="52" rx="6"/><text x="952" y="108">Device</text><text x="948" y="126">Manager</text>
</svg>
