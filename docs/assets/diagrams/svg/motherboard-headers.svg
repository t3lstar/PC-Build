<svg xmlns="http://www.w3.org/2000/svg" width="960" height="680" viewBox="0 0 960 680" role="img" aria-labelledby="title desc">
  <title id="title">Gigabyte B850 AORUS Elite WiFi7 motherboard header map</title>
  <desc id="desc">Simplified motherboard map showing CPU socket, memory slots, M.2 slots, PCIe slot, power connectors, front panel, USB, audio, fan and pump headers.</desc>
  <style>
    .board{fill:#202a2f;stroke:#111;stroke-width:4}
    .zone{fill:#2f3f46;stroke:#d8e1e5;stroke-width:2}
    .slot{fill:#111820;stroke:#e6eef2;stroke-width:2}
    .power{fill:#7c2d12;stroke:#fed7aa;stroke-width:2}
    .io{fill:#164e63;stroke:#a5f3fc;stroke-width:2}
    .fan{fill:#14532d;stroke:#bbf7d0;stroke-width:2}
    .text{font-family:Arial,sans-serif;font-size:18px;fill:#f8fafc}
    .small{font-size:14px}
    .label{fill:#020617;font-size:14px;font-weight:bold}
  </style>
  <rect class="board" x="80" y="40" width="760" height="600" rx="8"/>
  <rect class="io" x="90" y="70" width="110" height="260" rx="4"/>
  <text class="text small" x="105" y="110">Rear I/O</text>
  <rect class="zone" x="305" y="120" width="150" height="150" rx="8"/>
  <text class="text" x="328" y="200">AM5 CPU</text>
  <rect class="slot" x="500" y="85" width="28" height="250"/><text class="text small" x="498" y="360">A1</text>
  <rect class="slot" x="542" y="85" width="28" height="250"/><text class="text small" x="540" y="360">A2</text>
  <rect class="slot" x="584" y="85" width="28" height="250"/><text class="text small" x="582" y="360">B1</text>
  <rect class="slot" x="626" y="85" width="28" height="250"/><text class="text small" x="624" y="360">B2</text>
  <rect class="power" x="715" y="150" width="70" height="170" rx="4"/>
  <text class="text small" x="720" y="240">24-pin</text>
  <rect class="power" x="235" y="58" width="130" height="36" rx="4"/>
  <text class="text small" x="245" y="82">CPU EPS</text>
  <rect class="slot" x="245" y="380" width="440" height="34" rx="4"/>
  <text class="text small" x="350" y="403">Primary PCIe x16 for GPU</text>
  <rect class="slot" x="255" y="300" width="310" height="28" rx="4"/>
  <text class="text small" x="325" y="320">Primary M.2 NVMe</text>
  <rect class="slot" x="255" y="455" width="260" height="24" rx="4"/>
  <text class="text small" x="315" y="473">M.2 slot</text>
  <rect class="slot" x="255" y="510" width="260" height="24" rx="4"/>
  <text class="text small" x="315" y="528">M.2 slot</text>
  <rect class="io" x="690" y="455" width="105" height="36" rx="4"/>
  <text class="text small" x="705" y="479">USB-C FP</text>
  <rect class="io" x="690" y="505" width="105" height="36" rx="4"/>
  <text class="text small" x="704" y="529">USB-A FP</text>
  <rect class="io" x="255" y="575" width="110" height="34" rx="4"/>
  <text class="text small" x="270" y="598">HD Audio</text>
  <rect class="io" x="620" y="575" width="130" height="34" rx="4"/>
  <text class="text small" x="638" y="598">Front panel</text>
  <rect class="fan" x="420" y="58" width="110" height="34" rx="4"/>
  <text class="text small" x="438" y="81">CPU fan</text>
  <rect class="fan" x="545" y="58" width="110" height="34" rx="4"/>
  <text class="text small" x="558" y="81">Pump/AIO</text>
  <rect class="fan" x="765" y="365" width="56" height="185" rx="4"/>
  <text class="text small" x="773" y="430">SYS</text>
  <text class="text small" x="770" y="454">fan</text>
  <text class="text" x="90" y="665">Simplified layout for installation reference. Use the motherboard manual for exact pin numbering.</text>
</svg>
