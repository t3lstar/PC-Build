<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Memory slots</title>
  <desc id="desc">DIMM slot map showing A2 and B2 populated for a two-module DDR5 kit.</desc>
  <style>
    .board{fill:#202a2f;stroke:#111827;stroke-width:4}.cpu{fill:#475569;stroke:#e2e8f0;stroke-width:3}.slot{fill:#111827;stroke:#94a3b8;stroke-width:3}
    .use{fill:#bbf7d0;stroke:#16a34a;stroke-width:4}text{font-family:Arial,sans-serif;fill:#f8fafc;font-size:20px}.dark{fill:#0f172a}.small{font-size:16px}
  </style>
  <rect class="board" x="100" y="55" width="700" height="360" rx="10"/>
  <rect class="cpu" x="205" y="170" width="145" height="145" rx="8"/><text x="252" y="250">CPU</text>
  <rect class="slot" x="450" y="105" width="45" height="260" rx="4"/><text x="455" y="395">A1</text>
  <rect class="slot use" x="515" y="105" width="45" height="260" rx="4"/><text x="520" y="395">A2</text>
  <rect class="slot" x="580" y="105" width="45" height="260" rx="4"/><text x="585" y="395">B1</text>
  <rect class="slot use" x="645" y="105" width="45" height="260" rx="4"/><text x="650" y="395">B2</text>
  <text class="dark" x="130" y="465">For two DDR5 modules, install the matched kit in A2 and B2.</text>
</svg>
