site_name: Custom Gaming PC Build Manual
site_description: Professional documentation for a custom gaming PC build.
site_author: NOSWAD Consulting Ltd
site_url: https://t3lstar.github.io/PC-Build/
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  - Build Guide:
      - Introduction: 01-introduction.md
      - Components: 02-components.md
      - Motherboard Overview: 03-motherboard-overview.md
      - Case Overview: 04-case-overview.md
      - Tools: 05-tools.md
      - Build Preparation: 06-build-preparation.md
      - CPU Installation: 07-cpu-installation.md
      - Memory Installation: 08-memory-installation.md
      - M.2 Installation: 09-m2-installation.md
      - Case Build: 10-case-build.md
      - PSU Installation: 11-psu-installation.md
      - Motherboard Installation: 12-motherboard-installation.md
      - AIO Installation: 13-aio-installation.md
      - GPU Installation: 14-gpu-installation.md
      - Cable Routing: 15-cable-routing.md
      - Front Panel Connectors: 16-front-panel-connectors.md
      - First Boot: 17-first-boot.md
      - BIOS: 18-bios.md
      - EXPO: 19-expo.md
      - Driver Installation: 20-driver-installation.md
      - Windows Installation: 21-windows-installation.md
      - Gaming Optimisation: 22-gaming-optimisation.md
      - Benchmarks: 23-benchmarks.md
      - Troubleshooting: 24-troubleshooting.md
      - Maintenance: 25-maintenance.md
      - Upgrades: 26-upgrades.md
  - Appendix:
      - Glossary: appendix/glossary.md
      - FAQ: appendix/faq.md
      - Checklists: appendix/checklists.md
      - Bill of Materials: appendix/bill-of-materials.md
      - Drivers: appendix/drivers.md
      - BIOS Settings: appendix/bios-settings.md
      - Temperature Reference: appendix/temperature-reference.md
      - Publishing: appendix/publishing.md
