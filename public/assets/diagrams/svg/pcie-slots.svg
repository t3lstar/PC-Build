<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-labelledby="title desc">
  <title id="title">PCIe slots</title>
  <desc id="desc">Simplified PCIe slot diagram identifying the primary graphics card slot.</desc>
  <style>
    .board{fill:#202a2f;stroke:#111827;stroke-width:4}.slot{fill:#111827;stroke:#f8fafc;stroke-width:3}.gpu{fill:#ddd6fe;stroke:#6d28d9;stroke-width:3}
    text{font-family:Arial,sans-serif;fill:#f8fafc;font-size:20px}.dark{fill:#0f172a}.small{font-size:15px}
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect class="board" x="100" y="60" width="700" height="340" rx="10"/>
  <rect class="slot" x="210" y="150" width="470" height="34" rx="4"/><text x="255" y="175">Primary PCIe x16 slot for RX 9060 XT</text>
  <rect class="gpu" x="230" y="205" width="420" height="72" rx="8"/><text class="dark" x="340" y="250">GPU installed here</text>
  <rect class="slot" x="210" y="315" width="260" height="28" rx="4"/><text class="small" x="500" y="336">Secondary slot, not baseline GPU slot</text>
  <text x="120" y="440" class="dark">Install the graphics card in the primary reinforced PCIe x16 slot unless troubleshooting.</text>
</svg>
