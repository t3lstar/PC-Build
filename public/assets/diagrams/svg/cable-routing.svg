<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">Cable routing</title>
  <desc id="desc">Clean cable routing map with numbered callouts for ATX, CPU EPS, PCIe, front panel, audio, pump and fan cables.</desc>
  <style>
    .bg{fill:#f8fafc}.case{fill:#ffffff;stroke:#0f172a;stroke-width:4}.mb{fill:#e2e8f0;stroke:#334155;stroke-width:3}.psu{fill:#fde68a;stroke:#92400e;stroke-width:3}.gpu{fill:#ddd6fe;stroke:#6d28d9;stroke-width:3}
    .path{fill:none;stroke-width:7;stroke-linecap:round;marker-end:url(#arrow)}.atx{stroke:#ea580c}.eps{stroke:#dc2626}.pcie{stroke:#7c3aed}.fp{stroke:#0891b2}.audio{stroke:#16a34a}.fan{stroke:#2563eb}
    .badge{fill:#0f172a;stroke:#ffffff;stroke-width:2}.legend{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}
    text{font-family:Arial,sans-serif;fill:#0f172a;font-size:20px}.title{font-size:26px;font-weight:bold}.small{font-size:16px}.badgeText{fill:#ffffff;font-size:18px;font-weight:bold}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0,0 L0,8 L11,4 z" fill="#0f172a"/></marker></defs>
  <rect class="bg" width="1100" height="720"/>
  <text class="title" x="40" y="45">Cable Routing</text>
  <rect class="case" x="80" y="75" width="720" height="455" rx="12"/>
  <rect class="mb" x="210" y="130" width="420" height="300" rx="8"/><text x="350" y="285">Motherboard</text>
  <rect class="gpu" x="260" y="355" width="300" height="54" rx="8"/><text x="382" y="390">GPU</text>
  <rect class="psu" x="655" y="350" width="110" height="90" rx="8"/><text x="688" y="402">PSU</text>

  <path class="path eps" d="M700 355 C690 150,485 105,310 130"/>
  <circle class="badge" cx="405" cy="111" r="16"/><text class="badgeText" x="400" y="117">1</text>
  <path class="path atx" d="M655 375 C610 350,630 250,630 250"/>
  <circle class="badge" cx="632" cy="250" r="16"/><text class="badgeText" x="627" y="256">2</text>
  <path class="path pcie" d="M655 420 C620 455,585 415,560 395"/>
  <circle class="badge" cx="585" cy="432" r="16"/><text class="badgeText" x="580" y="438">3</text>
  <path class="path fp" d="M735 440 C760 510,625 525,605 430"/>
  <circle class="badge" cx="708" cy="510" r="16"/><text class="badgeText" x="703" y="516">4</text>
  <path class="path audio" d="M260 430 C315 505,515 500,600 430"/>
  <circle class="badge" cx="305" cy="493" r="16"/><text class="badgeText" x="300" y="499">5</text>
  <path class="path fan" d="M435 130 C500 75,620 85,680 130"/>
  <circle class="badge" cx="570" cy="88" r="16"/><text class="badgeText" x="565" y="94">6</text>

  <rect class="legend" x="825" y="95" width="245" height="305" rx="8"/>
  <text class="title" x="858" y="130">Legend</text>
  <text class="small" x="850" y="168">1 CPU EPS first</text>
  <text class="small" x="850" y="203">2 24-pin ATX</text>
  <text class="small" x="850" y="238">3 PCIe GPU power</text>
  <text class="small" x="850" y="273">4 Front panel / USB</text>
  <text class="small" x="850" y="308">5 HD audio</text>
  <text class="small" x="850" y="343">6 Pump and fan leads</text>
  <text class="small" x="105" y="580">Keep final cable ties loose until first boot and BIOS checks pass.</text>
</svg>
