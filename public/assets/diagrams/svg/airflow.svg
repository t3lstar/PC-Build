<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="title desc">
  <title id="title">Airflow flowchart</title>
  <desc id="desc">Detailed airflow flowchart preserving the Mermaid source relationships for bottom intake, side intake, GPU, motherboard, top radiator exhaust, optional rear exhaust, and warm air exit.</desc>
  <style>
    .bg{fill:#f8fafc}.box{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.line{stroke:#334155;stroke-width:3;marker-end:url(#arrow)}.dash{stroke-dasharray:8 6}
    text{font-family:Arial,sans-serif;fill:#0f172a;font-size:19px}.title{font-size:28px;font-weight:bold}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0,0 L0,8 L11,4 z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1100" height="680"/>
  <text class="title" x="42" y="50">Airflow Flow</text>
  <rect class="box" x="75" y="120" width="250" height="80" rx="8"/><text x="125" y="153">Bottom intake</text><text x="160" y="178">fans</text>
  <rect class="box" x="75" y="310" width="250" height="80" rx="8"/><text x="150" y="343">Side intake</text><text x="160" y="368">fans</text>
  <rect class="ok" x="430" y="120" width="300" height="80" rx="8"/><text x="485" y="153">GPU and lower</text><text x="480" y="178">motherboard area</text>
  <rect class="ok" x="430" y="310" width="300" height="80" rx="8"/><text x="500" y="343">CPU socket, VRM,</text><text x="505" y="368">and memory area</text>
  <rect class="warn" x="815" y="215" width="240" height="80" rx="8"/><text x="850" y="248">Top 360mm radiator</text><text x="900" y="273">exhaust</text>
  <rect class="warn" x="815" y="430" width="240" height="80" rx="8"/><text x="870" y="463">Optional rear</text><text x="890" y="488">exhaust</text>
  <rect class="ok" x="815" y="40" width="240" height="65" rx="8"/><text x="870" y="80">Warm air exits upward</text>
  <line class="line" x1="325" y1="160" x2="430" y2="160"/>
  <line class="line" x1="325" y1="350" x2="430" y2="350"/>
  <line class="line" x1="730" y1="160" x2="815" y2="240"/>
  <line class="line" x1="730" y1="350" x2="815" y2="270"/>
  <line class="line" x1="935" y1="215" x2="935" y2="105"/>
  <line class="line dash" x1="730" y1="350" x2="815" y2="455"/>
  <line class="line dash" x1="935" y1="430" x2="935" y2="105"/>
</svg>
